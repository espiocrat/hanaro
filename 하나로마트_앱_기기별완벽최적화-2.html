<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1, maximum-scale=5, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1B4332">
  <meta name="description" content="하나로마트 — 데이터 기반 소비자 소통 앱">
  <title>하나로마트 — 데이터 기반 소비자 소통 앱</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script>
    // Safari 높이 조정 (address bar 포함)
    (function(){
      function adjustHeightForSafari(){
        var app = document.querySelector('.app');
        if(!app) return;
        
        var windowHeight = window.innerHeight;
        var docHeight = document.documentElement.clientHeight;
        
        // Safari에서 address bar가 보일 때 vs 숨어있을 때 다름
        // 동적 viewport height를 사용
        if(typeof window.visualViewport !== 'undefined'){
          app.style.height = window.visualViewport.height + 'px';
        } else {
          app.style.height = windowHeight + 'px';
        }
      }
      
      adjustHeightForSafari();
      window.addEventListener('resize', adjustHeightForSafari);
      window.addEventListener('orientationchange', function(){
        setTimeout(adjustHeightForSafari, 100);
      });
      
      // scroll 이벤트로도 높이 재조정 (Safari address bar 숨김/표시)
      var scrollTimeout;
      window.addEventListener('scroll', function(){
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(adjustHeightForSafari, 100);
      });
    })();
  </script>
    
  <script>
    // 기존 기기 감지 코드
    (function(){
      var MODES = ['mode-mobile','mode-tablet','mode-pc'];
      var _resizeTimer = null;
      function detect(){
        var w = window.innerWidth || document.documentElement.clientWidth;
        var ua = navigator.userAgent || '';
        var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        var isIOS = /iPad|iPhone|iPod/.test(ua) || (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1);
        var isAndroid = /Android/i.test(ua);
        var cls;
        if(w <= 600) cls = 'mode-mobile';
        else if(w <= 1024) cls = 'mode-tablet';
        else cls = 'mode-pc';
        var root = document.documentElement;
        for(var i=0;i<MODES.length;i++) root.classList.remove(MODES[i]);
        root.classList.add(cls);
        root.setAttribute('data-mode', cls.replace('mode-',''));
      }
      detect();
      window.addEventListener('resize', function(){
        if(_resizeTimer) clearTimeout(_resizeTimer);
        _resizeTimer = setTimeout(detect, 150);
      });
    })();
  </script>
  <style>
    /* ===== 기본 CSS 초기화 ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    button, a, [role="button"], .nav-btn, .prod-card, .chip, .cat-btn, .prod-tab, .star, .send-btn {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    
    :focus-visible {
      outline: 2px solid var(--g3);
      outline-offset: 2px;
    }
    
    :root {
      --g0: #0a1f12;
      --g1: #1B4332;
      --g2: #2D6A4F;
      --g3: #40916C;
      --g4: #74C69D;
      --g5: #B7E4C7;
      --g6: #D8F3DC;
      --orange: #E76F1B;
      --orange-l: #fff3e0;
      --blue: #1D4ED8;
      --blue-l: #EFF6FF;
      --white: #fff;
      --off: #F8FAF9;
      --gray: #6B7280;
      --lgray: #E5E7EB;
      --dark: #1E2D24;
      --r: 14px;
      --rs: 10px;
      --rx: 6px;
      --font: 'Noto Sans KR', sans-serif;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 4px 24px rgba(0,0,0,.13);
    }
    
    html, body {
      font-family: var(--font);
      background: var(--off);
      color: var(--dark);
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: fixed;
    }
    
    body {
      display: flex;
      flex-direction: column;
    }
    
    /* ===== 모바일 레이아웃 (기본) ===== */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100%;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    .app-sidebar {
      display: none;
    }
    
    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      width: 100%;
    }
    
    .pages-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 0;
      width: 100%;
    }
    
    .page {
      display: none;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-top: max(12px, env(safe-area-inset-top));
      width: 100%;
      height: 100%;
    }
    
    .page.active {
      display: flex;
      flex-direction: column;
    }
    
    .page-content {
      flex: 1;
      min-height: 0;
    }
    
    .nav {
      display: flex;
      gap: 4px;
      background: var(--white);
      border-top: 1px solid var(--lgray);
      padding: 6px 4px max(0px, env(safe-area-inset-bottom)) max(0px, env(safe-area-inset-bottom));
      box-shadow: var(--shadow-lg);
      flex-shrink: 0;
      width: 100%;
      box-sizing: border-box;
      z-index: 100;
    }
    
    .nav-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      background: none;
      color: var(--gray);
      font-size: 9px;
      cursor: pointer;
      font-family: var(--font);
      border-radius: var(--rx);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-weight: 500;
      transition: color 0.2s;
      min-height: 44px;
    }
    
    .nav-btn-ico {
      font-size: 18px;
    }
    
    .nav-btn.active {
      color: var(--g3);
      background: var(--g6);
    }
    
    /* ===== 태블릿 레이아웃 (601px ~) ===== */
    @media (min-width: 601px) {
      .page {
        padding: 16px;
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
        padding-top: max(16px, env(safe-area-inset-top));
      }
      
      .nav-btn {
        font-size: 11px;
      }
      
      .nav-btn-ico {
        font-size: 20px;
      }
    }
    
    /* ===== PC 레이아웃 (1025px ~) ===== */
    @media (min-width: 1025px) {
      .app {
        flex-direction: row;
      }
      
      .app-sidebar {
        display: flex;
        flex-direction: column;
        width: 240px;
        background: var(--white);
        border-right: 1px solid var(--lgray);
        flex-shrink: 0;
        height: 100vh;
        height: 100dvh;
        z-index: 99;
        box-shadow: var(--shadow);
        padding-top: max(0px, env(safe-area-inset-top));
        padding-left: max(0px, env(safe-area-inset-left));
        padding-bottom: max(0px, env(safe-area-inset-bottom));
      }
      
      .sidebar-header {
        padding: 24px 16px 16px;
        border-bottom: 1px solid var(--lgray);
        flex-shrink: 0;
      }
      
      .sidebar-title {
        font-size: 20px;
        font-weight: 900;
        color: var(--g1);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 16px;
        flex: 1;
        overflow-y: auto;
      }
      
      .sidebar-nav-btn {
        padding: 12px 14px;
        border: none;
        background: none;
        color: var(--gray);
        font-size: 14px;
        cursor: pointer;
        font-family: var(--font);
        border-radius: var(--rs);
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
        transition: all 0.2s;
      }
      
      .sidebar-nav-btn:hover {
        background: var(--g6);
        color: var(--g3);
      }
      
      .sidebar-nav-btn.active {
        background: var(--g3);
        color: var(--white);
      }
      
      .sidebar-nav-ico {
        font-size: 18px;
        width: 20px;
        text-align: center;
      }
      
      .app-main {
        flex: 1;
        min-width: 0;
      }
      
      .pages-wrap {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }
      
      .page {
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-right: max(24px, env(safe-area-inset-right));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      
      .nav {
        display: none;
      }
    }
    
    /* ===== 공통 UI 컴포넌트 ===== */
    .sh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0 11px;
      width: 100%;
      box-sizing: border-box;
    }
    
    .sh-t {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    
    .sh-t::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--g3);
      border-radius: 2px;
      flex-shrink: 0;
    }
    
    .sh-a {
      font-size: 12px;
      color: var(--g3);
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px 8px;
    }
    
    .sh-a:hover {
      color: var(--g2);
    }
    
    /* ===== KPI 그리드 ===== */
    .kpi-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      width: 100%;
      grid-template-columns: repeat(2, 1fr);
    }
    
    @media (min-width: 601px) {
      .kpi-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    
    @media (min-width: 1025px) {
      .kpi-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    .kpi {
      background: var(--white);
      border-radius: var(--rs);
      padding: 12px 10px;
      border: 1px solid var(--lgray);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: all 0.2s;
    }
    
    .kpi:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }
    
    .kpi::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--ac, var(--g3));
      flex-shrink: 0;
    }
    
    .kpi-val {
      font-size: 18px;
      font-weight: 900;
      color: var(--g1);
      line-height: 1.2;
      word-break: break-word;
    }
    
    @media (min-width: 1025px) {
      .kpi-val {
        font-size: 20px;
      }
    }
    
    .kpi-lbl {
      font-size: 10px;
      color: var(--gray);
      margin-top: 4px;
      word-break: break-word;
    }
    
    .kpi-delta {
      font-size: 9px;
      color: var(--g3);
      font-weight: 600;
      margin-top: 2px;
    }
    
    .kpi-ico {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      opacity: .1;
      flex-shrink: 0;
    }
    
    /* ===== 상품 그리드 ===== */
    .prod-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      width: 100%;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    }
    
    @media (min-width: 601px) {
      .prod-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
    
    @media (min-width: 1025px) {
      .prod-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      }
    }
    
    .prod-card {
      background: var(--white);
      border-radius: var(--rs);
      border: 1px solid var(--lgray);
      overflow: hidden;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      min-height: 180px;
      transition: all 0.2s ease;
    }
    
    .prod-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
      border-color: var(--g3);
    }
    
    .prod-img {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: var(--g6);
      position: relative;
      flex-shrink: 0;
    }
    
    .prod-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: var(--g2);
      color: var(--white);
      font-size: 8px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      z-index: 1;
    }
    
    .prod-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    
    .prod-name {
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 3px;
      word-break: break-word;
      line-height: 1.3;
      flex-shrink: 0;
    }
    
    @media (min-width: 1025px) {
      .prod-name {
        font-size: 13px;
      }
    }
    
    .prod-origin {
      font-size: 9px;
      color: var(--g3);
      margin-bottom: 4px;
      word-break: break-word;
    }
    
    .prod-price {
      font-size: 13px;
      font-weight: 900;
      color: var(--orange);
      margin-bottom: 6px;
    }
    
    .prod-btn {
      margin-top: auto;
      width: 100%;
      padding: 6px;
      border: 1px solid var(--g4);
      background: var(--g6);
      color: var(--g2);
      border-radius: var(--rx);
      font-size: 9px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    
    .prod-btn:hover {
      background: var(--g4);
      color: var(--white);
    }
    
    /* ===== 피드 ===== */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
      width: 100%;
    }
    
    .feed-item {
      background: var(--white);
      border-radius: var(--rs);
      border: 1px solid var(--lgray);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    
    .feed-item:hover {
      box-shadow: var(--shadow-lg);
    }
    
    .feed-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    
    .feed-txt {
      font-size: 11px;
      flex: 1;
      line-height: 1.5;
      word-break: break-word;
      min-width: 0;
    }
    
    .feed-time {
      font-size: 9px;
      color: var(--gray);
      white-space: nowrap;
      flex-shrink: 0;
    }
    
    /* ===== 추적 카드 ===== */
    .trace-hero {
      background: var(--g1);
      border-radius: var(--r);
      padding: 14px;
      color: var(--white);
      margin-bottom: 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow-lg);
      width: 100%;
      box-sizing: border-box;
    }
    
    @media (min-width: 1025px) {
      .trace-hero {
        padding: 20px;
        gap: 16px;
      }
    }
    
    .trace-ico {
      font-size: 36px;
      background: rgba(255, 255, 255, .15);
      border-radius: var(--rs);
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    @media (min-width: 1025px) {
      .trace-ico {
        width: 80px;
        height: 80px;
        font-size: 44px;
      }
    }
    
    .trace-info {
      flex: 1;
      min-width: 0;
    }
    
    .trace-name {
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }
    
    @media (min-width: 1025px) {
      .trace-name {
        font-size: 18px;
      }
    }
    
    .trace-code {
      font-size: 9px;
      opacity: .7;
      margin-top: 2px;
      word-break: break-all;
    }
    
    .trace-tags {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    
    .trace-tag {
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(255, 255, 255, .2);
      color: var(--white);
      white-space: nowrap;
    }
    
    .trace-tag.hl {
      background: var(--g4);
      color: var(--g0);
    }
    
    /* ===== 탭 ===== */
    .prod-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 14px;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      box-sizing: border-box;
    }
    
    .prod-tabs::-webkit-scrollbar {
      display: none;
      height: 0;
    }
    
    .prod-tab {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--lgray);
      background: var(--white);
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      transition: all 0.2s;
    }
    
    .prod-tab:hover {
      border-color: var(--g3);
      color: var(--g3);
    }
    
    .prod-tab.active {
      background: var(--g2);
      color: var(--white);
      border-color: var(--g2);
    }
    
    /* ===== IoT 그리드 ===== */
    .iot-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
      width: 100%;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    }
    
    @media (min-width: 601px) {
      .iot-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }
    }
    
    @media (min-width: 1025px) {
      .iot-grid {
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      }
    }
    
    .iot-card {
      background: var(--white);
      border-radius: var(--rs);
      border: 1px solid var(--lgray);
      padding: 12px;
      text-align: center;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s;
    }
    
    .iot-card:hover {
      box-shadow: var(--shadow-lg);
    }
    
    .iot-ico {
      font-size: 20px;
      margin-bottom: 5px;
    }
    
    .iot-val {
      font-size: 18px;
      font-weight: 900;
      word-break: break-word;
    }
    
    .iot-lbl {
      font-size: 9px;
      color: var(--gray);
      margin-top: 3px;
      word-break: break-word;
    }
    
    .iot-st {
      font-size: 9px;
      font-weight: 600;
      margin-top: 2px;
      color: var(--g3);
    }
    
    /* ===== 타임라인 ===== */
    .tl {
      margin-bottom: 18px;
      width: 100%;
    }
    
    .tl-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
    }
    
    .tl-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 24px;
      flex-shrink: 0;
    }
    
    .tl-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 3px solid var(--g3);
      background: var(--white);
      flex-shrink: 0;
    }
    
    .tl-dot.done {
      background: var(--g3);
    }
    
    .tl-dot.now {
      background: var(--orange);
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(231, 111, 27, .2);
    }
    
    .tl-line {
      width: 2px;
      background: var(--g5);
      flex: 1;
      margin: 3px 0;
      min-height: 20px;
    }
    
    .tl-box {
      background: var(--white);
      border-radius: var(--rs);
      border: 1px solid var(--lgray);
      padding: 10px 12px;
      flex: 1;
      box-shadow: var(--shadow);
      word-break: break-word;
      transition: all 0.2s;
    }
    
    .tl-box:hover {

      function bindNav(){
        var btns = document.querySelectorAll('.nav-btn');
        for(var i = 0; i < btns.length; i++){
          btns[i].addEventListener('click', function(e){
            var pageId = this.getAttribute('data-page');
            var allPages = document.querySelectorAll('.page');
            var allBtns = document.querySelectorAll('.nav-btn');
            for(var j = 0; j < allPages.length; j++) allPages[j].classList.remove('active');
            for(var k = 0; k < allBtns.length; k++) allBtns[k].classList.remove('active');
            $(pageId).classList.add('active');
            this.classList.add('active');
          });
        }
        
        // PC 사이드바 네비게이션
        var sidebarNav = $('sidebar-nav');
        if(sidebarNav){
          sidebarNav.innerHTML = '';
          for(var n = 0; n < NAV_ITEMS.length; n++){
            var item = NAV_ITEMS[n];
            var btn = document.createElement('button');
            btn.className = 'sidebar-nav-btn' + (n === 0 ? ' active' : '');
            btn.innerHTML = '<span class="sidebar-nav-ico">' + item.ico + '</span><span>' + item.label + '</span>';

                var allPages = document.querySelectorAll('.page');
                var allSideBtns = document.querySelectorAll('.sidebar-nav-btn');
                var allNavBtns = document.querySelectorAll('.nav-btn');
                for(var j = 0; j < allPages.length; j++) allPages[j].classList.remove('active');
                for(var k = 0; k < allSideBtns.length; k++) allSideBtns[k].classList.remove('active');
                for(var m = 0; m < allNavBtns.length; m++) allNavBtns[m].classList.remove('active');

      function initMap(){
        function done(lat, lng, status){
          var msg = $('map-status');
          if(msg) msg.textContent = status;
          var sorted = STORES.slice().sort(function(a, b){
            var da = Math.abs(a.lat - lat) + Math.abs(a.lng - lng);
            var db = Math.abs(b.lat - lat) + Math.abs(b.lng - lng);
            return da - db;
          });
          drawMap(lat, lng, sorted);
          renderStoreList(sorted);
        }
        if(navigator.geolocation){
          navigator.geolocation.getCurrentPosition(
            function(p){done(p.coords.latitude, p.coords.longitude, '📍 현재 위치 확인 완료');},
            function(){done(37.5665, 126.9780, '⚠️ 위치 권한 거부 — 서울 기준 표시');},
            {timeout: 8000, maximumAge: 60000}
          );
        } else done(37.5665, 126.9780, '⚠️ 위치 서비스 미지원 — 서울 기준 표시');
      }
      
      function drawMap(uLat, uLng, stores){
        var canvas = $('map-canvas');
        if(!canvas) return;
        var W = canvas.parentElement ? canvas.parentElement.offsetWidth : 360;
        if(W < 10) W = 360;
        W = Math.min(W, window.innerWidth - 48);
        var H = canvas.style.height ? parseInt(canvas.style.height) : 200;
        if(document.documentElement.getAttribute('data-mode') === 'pc') H = 300;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        var ctx = canvas.getContext('2d');
        if(!ctx) return;
        ctx.scale(dpr, dpr);
        var lats = [uLat], lngs = [uLng];
        for(var i = 0; i < stores.length; i++){
          lats.push(stores[i].lat);
          lngs.push(stores[i].lng);
        }
        var minLat = Math.min.apply(null, lats) - 0.015;
        var maxLat = Math.max.apply(null, lats) + 0.015;
        var minLng = Math.min.apply(null, lngs) - 0.015;
        var maxLng = Math.max.apply(null, lngs) + 0.015;
        var pad = 30;
        function xy(lat, lng){
          return [pad + (lng - minLng) / (maxLng - minLng) * (W - pad * 2), pad + (maxLat - lat) / (maxLat - minLat) * (H - pad * 2)];
        }
        var g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, '#e8f5e9');
        g.addColorStop(1, '#c8e6c9');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1;
        for(var x = 1; x < 4; x++){
          ctx.beginPath();
          ctx.moveTo(W * x / 4, 0);
          ctx.lineTo(W * x / 4, H);
          ctx.stroke();
        }
        for(var y = 1; y < 3; y++){
          ctx.beginPath();
          ctx.moveTo(0, H * y / 3);
          ctx.lineTo(W, H * y / 3);
          ctx.stroke();
        }
        for(var k = 0; k < stores.length; k++){
          var p = xy(stores[k].lat, stores[k].lng), r = k === 0 ? 11 : 8;
          ctx.beginPath();
          ctx.arc(p[0], p[1] + 2, r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0,0,0,0.12)';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p[0], p[1], r, 0, Math.PI * 2);
          ctx.fillStyle = k === 0 ? '#1B4332' : '#40916C';
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.fill();
          ctx.stroke();
          ctx.font = 'bold ' + (r > 9 ? '9' : '7') + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#fff';
          ctx.fillText('M', p[0], p[1]);
          var sh = stores[k].name.replace('하나로마트 ', '').replace('점', '');
          ctx.font = 'bold 8px sans-serif';
          ctx.textBaseline = 'top';
          var tw = ctx.measureText(sh).width + 6;
          ctx.fillStyle = 'rgba(255,255,255,0.88)';
          ctx.fillRect(p[0] - tw / 2, p[1] + r + 2, tw, 12);
          ctx.fillStyle = '#1B4332';
          ctx.fillText(sh, p[0], p[1] + r + 3);
        }
        var up = xy(uLat, uLng);
        ctx.beginPath();
        ctx.arc(up[0], up[1], 14, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(29,78,216,0.15)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(up[0], up[1], 8, 0, Math.PI * 2);
        ctx.fillStyle = '#1D4ED8';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.font = 'bold 8px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.fillText('●', up[0], up[1]);
      }
      
      function renderStoreList(stores){
        var wrap = $('store-list');
        if(!wrap) return;
        wrap.innerHTML = '';
        for(var i = 0; i < stores.length; i++){
          var s = stores[i], card = document.createElement('div');
          card.className = 'store-card' + (i === 0 ? ' nearest' : '');
          var tagsHtml = '';
          for(var j = 0; j < s.tags.length; j++){
            var t = s.tags[j];
            tagsHtml += '<span class="stag ' + (t.indexOf('할인') > -1 || t.indexOf('신상') > -1 ? 'o' : 'g') + '">' + t + '</span>';
          }
          card.innerHTML = '<div class="store-ico">🏪</div><div class="store-info"><div class="store-nm">' + s.name + (i === 0 ? ' 🏆' : '') + '</div><div class="store-dist">' + s.dist + (i === 0 ? ' · 가장 가까운 매장' : '') + '</div><div class="store-addr">' + s.addr + '</div><div class="store-tags">' + tagsHtml + '</div></div>';
          wrap.appendChild(card);
        }
      }
      
      function appendBot(html, withTyping){
        var box = $('chat-msgs');
        if(!box) return;
        function append(){
          var d = document.createElement('div');
          d.className = 'mw';
          d.innerHTML = '<div class="mav">🤖</div><div><div class="mtime">방금</div><div class="bbl bot">' + html.replace(/\n/g, '<br>') + '</div></div>';
          box.appendChild(d);
          box.scrollTop = 99999;
        }
        if(withTyping === false){
          append();
          return;
        }
        var tw = document.createElement('div');
        tw.className = 'mw';
        tw.innerHTML = '<div class="mav">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
        box.appendChild(tw);
        box.scrollTop = 99999;
        setTimeout(function(){
          if(tw.parentNode) tw.parentNode.removeChild(tw);
          append();
        }, 700);
      }
      
      function addUser(q){
        var box = $('chat-msgs');
        if(!box) return;
        var d = document.createElement('div');
        d.className = 'mw u';
        d.innerHTML = '<div class="mav">👤</div><div><div class="mtime">방금</div><div class="bbl usr">' + sanitizeHTML(q) + '</div></div>';
        box.appendChild(d);
        box.scrollTop = 99999;
        appendBot(BOT[q] || '데이터를 분석하고 있어요... 잠시만요! 😊\n\n생산이력, 할인 정보, 레시피, 매장 재고 등 언제든 물어봐 주세요!', true);
      }
      
      function sanitizeHTML(str){
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }
      
      function buildChatCats(){
        var wrap = $('chat-cats');
        if(!wrap) return;
        wrap.innerHTML = '';
        for(var i = 0; i < CHAT_CATS.length; i++){
          var c = CHAT_CATS[i], b = document.createElement('button');
          b.className = 'cat-btn' + (c.id === currentCat ? ' active' : '');
          b.textContent = c.label;
          (function(cid, btn){
            b.addEventListener('click', function(){
              currentCat = cid;
              var all = document.querySelectorAll('.cat-btn');
              for(var x = 0; x < all.length; x++) all[x].classList.remove('active');
              btn.classList.add('active');
              renderChips(cid);
            });
          })(c.id, b);
          wrap.appendChild(b);
        }
      }
      
      function renderChips(cat){
        var wrap = $('chip-wrap');
        if(!wrap) return;
        wrap.innerHTML = '';
        var qs = CHAT_QA[cat] || CHAT_QA.all;
        for(var i = 0; i < qs.length; i++){
          var q = qs[i], b = document.createElement('button');
          b.className = 'chip';
          b.textContent = q;
          (function(question){
            b.addEventListener('click', function(){
              addUser(question);
            });
          })(q);
          wrap.appendChild(b);
        }
      }
      
      function initChat(){
        var msgs = $('chat-msgs');
        if(!msgs) return;
        msgs.innerHTML = '';
        appendBot('안녕하세요 김농협 고객님! 😊\n\n이달에 <strong>녹색 채소류</strong>를 자주 구매하시는군요.\n아래 카테고리에서 주제를 선택하거나 직접 입력해 보세요!', false);
        buildChatCats();
        renderChips('all');
        var inp = $('chat-input'), snd = $('send-btn');
        function send(){
          var v = inp ? inp.value.trim() : '';
          if(!v) return;
          addUser(v);
          inp.value = '';
        }
        if(snd){
          snd.addEventListener('click', send);
        }
        if(inp){
          inp.addEventListener('keydown', function(e){
            if(e.key === 'Enter'){
              send();
            }
          });
        }
      }
      
      function init(){
        try{
          bindNav();
          buildHomeGrid();
          buildTraceTabs();
          renderTrace();
          initStars();
          initMap();
          initChat();
        }catch(e){
          console.error('초기화 오류:', e);
        }
      }
      
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        setTimeout(init, 0);
      }else{
        document.addEventListener('DOMContentLoaded', init);
      }
    })();
